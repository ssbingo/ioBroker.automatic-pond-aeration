name: Test and Release

# Run this job on all pushes and pull requests
# as well as tags with a semantic version
on:
  push:
    branches:
      - "main"
    tags:
      # normal versions
      - "v[0-9]+.[0-9]+.[0-9]+"
      # pre-releases
      - "v[0-9]+.[0-9]+.[0-9]+-**"
  pull_request: {}

# Cancel previous PR/branch runs when a new commit is pushed
concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Performs quick checks before the expensive test runs
  check-and-lint:
    if: contains(github.event.head_commit.message, '[skip ci]') == false

    runs-on: ubuntu-latest

    steps:
      - uses: ioBroker/testing-action-check@v2
        with:
          node-version: '24.x'
          # Uncomment the following line if your adapter cannot be installed using 'npm ci'
          # install-command: 'npm install'
          lint: true

  # Runs adapter tests on all supported node versions and OSes
  adapter-tests:
    needs: [check-and-lint]
    if: contains(github.event.head_commit.message, '[skip ci]') == false

    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        node-version: [22.x, 24.x]
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: ioBroker/testing-action-adapter@v1
        with:
          node-version: ${{ matrix.node-version }}
          os: ${{ matrix.os }}
          # Uncomment the following line if your adapter cannot be installed using 'npm ci'
          # install-command: 'npm install'
          build: true

  # Deploys the final package to npm using npm trusted publishing (OIDC).
  # No NPM_TOKEN is used; npm verifies the GitHub OIDC token via "id-token: write".
  # Prerequisite: configure a trusted publisher for this package on npmjs.com
  # (repository ssbingo/ioBroker.automatic-pond-aeration, workflow test-and-release.yml).
  # See https://docs.npmjs.com/trusted-publishers
  deploy:
    needs: [check-and-lint, adapter-tests]

    # Trigger this step only when a commit on any branch is tagged with a version number
    if: |
      contains(github.event.head_commit.message, '[skip ci]') == false &&
      github.event_name == 'push' &&
      startsWith(github.ref, 'refs/tags/v')

    runs-on: ubuntu-latest

    # id-token: write enables npm trusted publishing (OIDC); contents: write creates the GitHub release
    permissions:
      id-token: write
      contents: write

    steps:
      # NOTE: we intentionally do NOT use ioBroker/testing-action-deploy@v1 here. That action runs
      # `npm install -g npm@latest`, and npm@latest currently ships a broken global install that is
      # missing the bundled 'sigstore' module, so `npm publish` fails while generating provenance
      # ("Cannot find module 'sigstore'"). We publish explicitly with a pinned npm >= 11.5.1 that
      # supports OIDC trusted publishing (no NPM_TOKEN needed) and has an intact provenance path.
      - uses: actions/checkout@v4
      - name: Use Node.js 24.x
        uses: actions/setup-node@v4
        with:
          node-version: '24.x'
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
      - run: npm run build
      - name: Pin npm (OIDC + working provenance)
        run: npm install -g npm@11.5.1
      - run: npm --version
      - name: Publish to npm (trusted publishing / OIDC)
        run: npm publish --provenance --access public
      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --generate-notes
