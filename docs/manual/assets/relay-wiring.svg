<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 470" font-family="DejaVu Sans">
  <defs>
    <marker id="rw-a" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#5b7683"/>
    </marker>
  </defs>

  <!-- Controller -->
  <rect x="30" y="40" width="180" height="70" rx="10" fill="#0A4D68"/>
  <text x="120" y="70" fill="#ffffff" font-size="14" font-weight="bold" text-anchor="middle">Controller</text>
  <text x="120" y="90" fill="#cdeaf2" font-size="11" text-anchor="middle">ioBroker / ESP32</text>

  <!-- Relay board -->
  <rect x="30" y="150" width="180" height="280" rx="10" fill="#e8f4f8" stroke="#1B98B5" stroke-width="2"/>
  <text x="120" y="176" fill="#0A4D68" font-size="13" font-weight="bold" text-anchor="middle">Relay board (8 ch.)</text>
  <!-- control line controller -> board -->
  <line x1="120" y1="110" x2="120" y2="150" stroke="#5b7683" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#rw-a)"/>

  <!-- relay channels -->
  <g font-size="11" fill="#12303a">
    <!-- rows -->
    <g>
      <rect x="46" y="192" width="148" height="26" rx="5" fill="#ffffff" stroke="#cfe1e8"/>
      <circle cx="60" cy="205" r="5" fill="#1B98B5"/><text x="74" y="209">CH1 · valve 1</text>
    </g>
    <g>
      <rect x="46" y="222" width="148" height="26" rx="5" fill="#ffffff" stroke="#cfe1e8"/>
      <circle cx="60" cy="235" r="5" fill="#1B98B5"/><text x="74" y="239">CH2 · valve 2</text>
    </g>
    <g>
      <rect x="46" y="252" width="148" height="26" rx="5" fill="#ffffff" stroke="#cfe1e8"/>
      <circle cx="60" cy="265" r="5" fill="#1B98B5"/><text x="74" y="269">CH3 · valve 3</text>
    </g>
    <g>
      <rect x="46" y="282" width="148" height="26" rx="5" fill="#ffffff" stroke="#cfe1e8"/>
      <circle cx="60" cy="295" r="5" fill="#8aa2ad"/><text x="74" y="299" fill="#5b7683">CH4–6 · valves …</text>
    </g>
    <g>
      <rect x="46" y="322" width="148" height="26" rx="5" fill="#fef6e6" stroke="#e5c98a"/>
      <circle cx="60" cy="335" r="5" fill="#b9770e"/><text x="74" y="339" fill="#8a5a09">CH7 · emergency valve</text>
    </g>
    <g>
      <rect x="46" y="352" width="148" height="26" rx="5" fill="#f0f3f5" stroke="#cfd8dd"/>
      <circle cx="60" cy="365" r="5" fill="#5b7683"/><text x="74" y="369" fill="#3f5560">CH8 · pump (optional)</text>
    </g>
  </g>

  <!-- Field devices -->
  <!-- valve NC -->
  <g>
    <circle cx="470" cy="205" r="18" fill="#e8f4f8" stroke="#1B98B5" stroke-width="3"/>
    <text x="470" y="210" fill="#0A4D68" font-size="13" font-weight="bold" text-anchor="middle">V</text>
    <text x="500" y="200" fill="#12303a" font-size="12" font-weight="bold">Aeration valves (solenoid)</text>
    <text x="500" y="217" fill="#1e7a46" font-size="11">wire NC → de-energised = CLOSED</text>
    <line x1="205" y1="205" x2="450" y2="205" stroke="#1B98B5" stroke-width="2"/>
  </g>
  <!-- emergency NO -->
  <g>
    <circle cx="470" cy="335" r="18" fill="#fef6e6" stroke="#b9770e" stroke-width="3"/>
    <text x="470" y="340" fill="#b9770e" font-size="13" font-weight="bold" text-anchor="middle">E</text>
    <text x="500" y="330" fill="#12303a" font-size="12" font-weight="bold">Emergency valve</text>
    <text x="500" y="347" fill="#b9770e" font-size="11">wire NO → de-energised = OPEN (failsafe)</text>
    <line x1="205" y1="335" x2="450" y2="335" stroke="#b9770e" stroke-width="2"/>
  </g>
  <!-- pump -->
  <g>
    <rect x="452" y="352" width="40" height="30" rx="6" fill="#5b7683"/>
    <text x="472" y="372" fill="#ffffff" font-size="12" font-weight="bold" text-anchor="middle">P</text>
    <text x="504" y="365" fill="#12303a" font-size="12" font-weight="bold">Air pump</text>
    <text x="504" y="382" fill="#5b7683" font-size="11">de-energised = OFF</text>
    <line x1="205" y1="367" x2="452" y2="367" stroke="#5b7683" stroke-width="2"/>
  </g>

  <!-- failsafe callout -->
  <rect x="500" y="40" width="308" height="120" rx="10" fill="#e8f6ee" stroke="#1e7a46" stroke-width="1.5"/>
  <rect x="500" y="40" width="6" height="120" rx="3" fill="#1e7a46"/>
  <text x="522" y="64" fill="#1e7a46" font-size="12" font-weight="bold">Power-off = SAFE state</text>
  <text x="522" y="86" fill="#12303a" font-size="11">On a power cut the relays release, so:</text>
  <text x="522" y="106" fill="#12303a" font-size="11">• valves CLOSED (NC)</text>
  <text x="522" y="124" fill="#12303a" font-size="11">• emergency valve OPEN (NO) → pump can vent</text>
  <text x="522" y="142" fill="#12303a" font-size="11">• pump OFF</text>
</svg>
