<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 500" font-family="DejaVu Sans">
  <!-- 3V3 rail -->
  <line x1="250" y1="40" x2="800" y2="40" stroke="#c0392b" stroke-width="2.5"/>
  <text x="252" y="34" fill="#c0392b" font-size="11" font-weight="bold">3.3 V</text>
  <!-- GND rail -->
  <line x1="250" y1="470" x2="800" y2="470" stroke="#12303a" stroke-width="2.5"/>
  <text x="252" y="486" fill="#12303a" font-size="11" font-weight="bold">GND</text>

  <!-- ESP32 board -->
  <rect x="30" y="120" width="180" height="260" rx="10" fill="#0A4D68"/>
  <text x="120" y="150" fill="#ffffff" font-size="13" font-weight="bold" text-anchor="middle">ESP32-S3</text>
  <text x="120" y="168" fill="#9fd6e6" font-size="10" text-anchor="middle">(Waveshare board)</text>
  <!-- pins -->
  <g font-size="11" fill="#ffffff">
    <rect x="185" y="185" width="45" height="20" rx="4" fill="#1B98B5"/><text x="207" y="199" text-anchor="middle">3V3</text>
    <rect x="185" y="215" width="45" height="20" rx="4" fill="#1B98B5"/><text x="207" y="229" text-anchor="middle">SDA</text>
    <rect x="185" y="245" width="45" height="20" rx="4" fill="#1B98B5"/><text x="207" y="259" text-anchor="middle">SCL</text>
    <rect x="185" y="285" width="45" height="20" rx="4" fill="#b9770e"/><text x="207" y="299" text-anchor="middle">GP2</text>
    <rect x="185" y="325" width="45" height="20" rx="4" fill="#5b7683"/><text x="207" y="339" text-anchor="middle">GND</text>
  </g>
  <g font-size="9.5" fill="#cdeaf2">
    <text x="235" y="199">3.3 V out</text>
    <text x="235" y="229">GPIO42 (I²C data)</text>
    <text x="235" y="259">GPIO41 (I²C clock)</text>
    <text x="235" y="299" fill="#f2d9ad">GPIO2 (1-Wire)</text>
  </g>

  <!-- board rails to power lines -->
  <line x1="207" y1="185" x2="207" y2="40" stroke="#c0392b" stroke-width="2"/>
  <line x1="207" y1="345" x2="207" y2="470" stroke="#12303a" stroke-width="2"/>

  <!-- I2C bus -->
  <line x1="230" y1="225" x2="770" y2="225" stroke="#1B98B5" stroke-width="2.5"/>
  <line x1="230" y1="255" x2="770" y2="255" stroke="#1B98B5" stroke-width="2.5"/>
  <text x="250" y="217" fill="#0A4D68" font-size="10">I²C bus (shared)</text>

  <!-- single pull-up pair -->
  <g>
    <line x1="300" y1="225" x2="300" y2="90" stroke="#c0392b" stroke-width="1.5"/>
    <line x1="320" y1="255" x2="320" y2="90" stroke="#c0392b" stroke-width="1.5"/>
    <line x1="300" y1="90" x2="320" y2="90" stroke="#c0392b" stroke-width="1.5"/>
    <line x1="310" y1="90" x2="310" y2="40" stroke="#c0392b" stroke-width="1.5"/>
    <rect x="286" y="120" width="48" height="18" rx="3" fill="#ffffff" stroke="#c0392b"/>
    <text x="310" y="133" fill="#c0392b" font-size="10" text-anchor="middle">4.7k ×2</text>
    <text x="286" y="112" fill="#5b7683" font-size="9">only ONE pull-up pair</text>
  </g>

  <!-- EZO-DO -->
  <g>
    <rect x="420" y="120" width="150" height="70" rx="8" fill="#ffffff" stroke="#1B98B5" stroke-width="2"/>
    <text x="495" y="145" fill="#0A4D68" font-size="12" font-weight="bold" text-anchor="middle">EZO-DO</text>
    <text x="495" y="163" fill="#5b7683" font-size="10" text-anchor="middle">oxygen · I²C 0x61</text>
    <text x="495" y="180" fill="#b9770e" font-size="9" text-anchor="middle">use isolation carrier!</text>
    <line x1="460" y1="190" x2="460" y2="225" stroke="#1B98B5" stroke-width="2"/>
    <line x1="500" y1="190" x2="500" y2="255" stroke="#1B98B5" stroke-width="2"/>
    <!-- probe -->
    <line x1="495" y1="120" x2="495" y2="95" stroke="#5b7683" stroke-width="2"/>
    <text x="505" y="102" fill="#5b7683" font-size="9">DO probe → water</text>
  </g>

  <!-- XGZP6897D -->
  <g>
    <rect x="620" y="120" width="150" height="70" rx="8" fill="#ffffff" stroke="#1B98B5" stroke-width="2"/>
    <text x="695" y="145" fill="#0A4D68" font-size="12" font-weight="bold" text-anchor="middle">XGZP6897D</text>
    <text x="695" y="163" fill="#5b7683" font-size="10" text-anchor="middle">pressure · 0x6D/0x58</text>
    <text x="695" y="180" fill="#5b7683" font-size="9" text-anchor="middle">air tube → manifold</text>
    <line x1="660" y1="190" x2="660" y2="225" stroke="#1B98B5" stroke-width="2"/>
    <line x1="700" y1="190" x2="700" y2="255" stroke="#1B98B5" stroke-width="2"/>
  </g>

  <!-- DS18B20 on 1-wire -->
  <g>
    <line x1="230" y1="295" x2="560" y2="295" stroke="#b9770e" stroke-width="2.5"/>
    <text x="250" y="288" fill="#8a5a09" font-size="10">1-Wire (GPIO2)</text>
    <!-- pull-up to 3v3 -->
    <line x1="400" y1="295" x2="400" y2="40" stroke="#c0392b" stroke-width="1.5"/>
    <rect x="376" y="200" width="48" height="18" rx="3" fill="#ffffff" stroke="#c0392b"/>
    <text x="400" y="213" fill="#c0392b" font-size="10" text-anchor="middle">4.7k</text>
    <!-- sensor -->
    <rect x="480" y="325" width="150" height="66" rx="8" fill="#fef6e6" stroke="#b9770e" stroke-width="2"/>
    <text x="555" y="350" fill="#8a5a09" font-size="12" font-weight="bold" text-anchor="middle">DS18B20</text>
    <text x="555" y="368" fill="#8a5a09" font-size="10" text-anchor="middle">water temp · 1-Wire</text>
    <text x="555" y="384" fill="#b9770e" font-size="9" text-anchor="middle">waterproof probe → water</text>
    <line x1="530" y1="325" x2="530" y2="295" stroke="#b9770e" stroke-width="2"/>
    <line x1="510" y1="391" x2="510" y2="470" stroke="#12303a" stroke-width="2"/>
    <line x1="580" y1="325" x2="580" y2="40" stroke="#c0392b" stroke-width="1.2"/>
  </g>

  <!-- note -->
  <rect x="620" y="325" width="180" height="90" rx="8" fill="#eef1f3" stroke="#5b7683" stroke-width="1"/>
  <rect x="620" y="325" width="5" height="90" rx="2" fill="#5b7683"/>
  <text x="636" y="347" fill="#5b7683" font-size="10.5" font-weight="bold">All sensors at 3.3 V</text>
  <text x="636" y="366" fill="#12303a" font-size="9.5">no level shifting needed.</text>
  <text x="636" y="384" fill="#12303a" font-size="9.5">Addresses 0x61 / 0x6D do</text>
  <text x="636" y="399" fill="#12303a" font-size="9.5">not clash with the board's</text>
  <text x="636" y="412" fill="#12303a" font-size="9.5">relay expander (0x20) / RTC.</text>
</svg>
